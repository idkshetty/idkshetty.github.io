<!DOCTYPE html>
<html>
<head>
  <title>Server Status</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 32px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }

    .status {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .link {
      font-size: 13px;
      color: #888;
      word-break: break-all;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: #2d7ef7;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    .btn:hover {
      background: #1f6ae6;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Server Status</h1>
    <div class="status">Connection Link</div>
    <div id="link" class="link">Waiting for server...</div>
    <a id="btn" class="btn" href="#" target="_blank">Open</a>
  </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCxc67ZQiY4hHfAkvNq1emVC8qUoT_diBQ",
  authDomain: "portfoilio-manager.firebaseapp.com",
  databaseURL: "https://portfoilio-manager-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "portfoilio-manager",
  storageBucket: "portfoilio-manager.appspot.com",
  messagingSenderId: "1065030502150",
  appId: "1:1065030502150:web:27e2601523587f4ac64087",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("server/url").on("value", (snapshot) => {
  const url = snapshot.val();
  if (!url) return;
  document.getElementById("link").innerText = url;
  document.getElementById("btn").href = url;
});
</script>

</body>
</html>
